#
# An OPT-IN sample Postgres for trying the SQL / Postgres nodes. Layer it on:
#
#   docker compose -f docker-compose.yml -f docker-compose.sample-db.yml up -d
#
# Then add a Postgres connection in Metis (host: postgres, port: 5432,
# database: metis_sample, user: metis, password: sample) and a SQL step like
# "select * from orders". Kept out of the hero compose so the offline two-service
# quickstart (gate 5) stays a pure Temporal + Metis boot.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: metis_sample
      POSTGRES_USER: metis
      POSTGRES_PASSWORD: sample
    networks:
      - metis
    volumes:
      - ./sample-db.sql:/docker-entrypoint-initdb.d/sample-db.sql:ro
      - sample-db-data:/var/lib/postgresql/data

volumes:
  sample-db-data:
