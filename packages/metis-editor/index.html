<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Metis</title>
    <script>
      // Dark-first identity: first-time visitors get dark; a stored choice wins.
      const stored = localStorage.getItem('metis-theme');
      document.documentElement.dataset.theme = stored || 'dark';
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
